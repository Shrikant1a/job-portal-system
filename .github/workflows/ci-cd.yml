name: Ultimate CI/CD Fix

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Force Upgrade NPM
      run: npm install -g npm@latest

    - name: Verify Versions
      run: |
        node -v
        npm -v
        npx -v

    - name: Install and Build
      working-directory: ./frontend
      run: |
        npm install
        npx --node-arg=--version vite build || npm run build

    - name: Upload Frontend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

  build-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Backend
      run: |
        mkdir -p bin
        javac -cp "lib/*" -d bin src/com/jobportal/application/*.java src/com/jobportal/application/models/*.java
        cd bin
        jar -cvf ../HireNova-Backend.jar .
        
    - name: Upload Backend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: HireNova-Backend.jar
